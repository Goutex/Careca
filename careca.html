<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careca Bonitão</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .subtitulo {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
            font-style: italic;
        }
        
        .imagem-careca {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border: 4px solid #667eea;
            transition: transform 0.3s;
        }
        
        .imagem-careca:hover {
            transform: scale(1.02);
        }
        
        .legenda {
            margin-top: 20px;
            color: #555;
            font-size: 1.1em;
        }
        
        .badge {
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔥 CARECA BONITÃO 🔥</h1>
        <p class="subtitulo">O careca mais bonito da galáxia!</p>
        
        <!-- Imagem do The Rock (Dwayne Johnson) -->
        <img class="imagem-careca" 
             src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Dwayne_Johnson_2014_%28cropped%29.jpg/480px-Dwayne_Johnson_2014_%28cropped%29.jpg" 
             alt="Careca bonitão - The Rock"
             title="The Rock - O careca mais bonitão">
        
        <p class="legenda">
            ⭐ Dwayne "The Rock" Johnson ⭐<br>
            O careca que conquistou o mundo!
        </p>
        
        <div class="badge">
            #CarecasSaoLindos
        </div>
    </div>
</body>
</html>
